<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sashi Vijay | Sakura Estate Prototype</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <canvas id="scene" aria-label="Voxel-inspired sakura house walkthrough"></canvas>

    <main class="hud">
      <section class="intro" id="intro">
        <p class="eyebrow">Environment prototype</p>
        <h1>Sakura Estate</h1>
        <p class="summary">
          A warm voxel-inspired Japanese house scene. Cross the bridge, enter
          the house, and explore the rooms before portfolio content is added.
        </p>
        <button id="enterButton" class="primary">Start exploring</button>
      </section>

      <nav class="quick-nav" aria-label="Quick navigation">
        <button data-spot="Bridge">Bridge</button>
        <button data-spot="Gate">Gate</button>
        <button data-spot="Hall">Hall</button>
        <button data-spot="West Room">West Room</button>
        <button data-spot="East Room">East Room</button>
        <button data-spot="Rear Room">Rear Room</button>
      </nav>

      <div class="corner-panel">
        <span id="spotLabel">Bridge</span>
        <small>W/S move - A/D turn - Q/E strafe - Space jump - mouse or drag to look</small>
      </div>

      <div class="time-pill">
        <span id="timeLabel">Golden Hour</span>
      </div>

      <div class="reticle" aria-hidden="true"></div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sashit Vijay | Interactive Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="./src/styles.css?v=2" />
  </head>
  <body>
    <canvas id="scene" aria-label="Japanese interior walkthrough portfolio"></canvas>

    <main class="hud">
      <section class="intro" id="intro">
        <p class="eyebrow">Interactive portfolio</p>
        <h1>Sashit Vijay</h1>
        <p class="summary">
          A Japanese interior built as a quiet walkthrough portfolio.
          Step through each room to discover my work, background, and contact links.
        </p>
        <button id="enterButton" class="primary">Enter portfolio</button>
      </section>

      <nav class="quick-nav" aria-label="Quick navigation">
        <button data-spot="Map">Entry<span>Hall</span></button>
        <button data-spot="Hall">Mission<span>West Wing</span></button>
        <button data-spot="Tech">Stack<span>East Wing</span></button>
        <button data-spot="West Room">Education<span>West Room</span></button>
        <button data-spot="East Room">Projects<span>East Room</span></button>
        <button data-spot="Rear Room">Experience<span>Rear Room</span></button>
        <button data-spot="Contact">Contact<span>Study</span></button>
      </nav>

      <div class="corner-panel">
        <span id="spotLabel">Entry Hall</span>
        <small>W/S move &middot; A/D turn &middot; Q/E strafe &middot; F interact &middot; drag to look</small>
      </div>

      <button class="theme-pill" id="themeToggle" type="button" aria-label="Toggle light / dark mode">
        <span class="theme-pill__icon" aria-hidden="true"></span>
        <span class="theme-pill__label" id="themeLabel">Dark</span>
      </button>

      <div class="reticle" aria-hidden="true"></div>
      <div class="interaction-hint" id="interactionHint" aria-live="polite"></div>
    </main>

    <aside class="portfolio-panel" id="portfolioPanel" aria-hidden="true" aria-labelledby="portfolioTitle">
      <button class="panel-close" id="portfolioClose" type="button" aria-label="Close portfolio panel">Close</button>
      <p class="panel-eyebrow" id="portfolioEyebrow">Portfolio</p>
      <h2 id="portfolioTitle">Portfolio</h2>
      <div class="panel-body" id="portfolioBody"></div>
    </aside>

    <a class="back-home" href="./index.html" aria-label="Back to portfolio">&#8592; Portfolio</a>

    <script type="module" src="./src/main.js?v=6"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sashit Vijay | Sakura House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css?v=6" />
  </head>
  <body>
    <canvas id="scene" aria-label="Lakeside sakura house walkthrough portfolio"></canvas>

    <main class="hud">
      <section class="intro" id="intro">
        <p class="eyebrow">Interactive portfolio</p>
        <h1>Sashit Vijay</h1>
        <p class="summary">
          A lakeside sakura house built as a quiet walkthrough portfolio.
          Explore each room to discover my work, background, and contact links.
        </p>
      </section>

      <nav class="quick-nav" aria-label="Quick navigation">
        <button data-spot="Bridge">Start<span>Bridge</span></button>
        <button data-spot="Gate">Entry<span>Gate</span></button>
        <button data-spot="Map">Map<span>Foyer</span></button>
        <button data-spot="Hall">Mission<span>Main Hall</span></button>
        <button data-spot="Tech">Stack<span>Tool Wall</span></button>
        <button data-spot="West Room">Education<span>West Room</span></button>
        <button data-spot="East Room">Projects<span>East Room</span></button>
        <button data-spot="Rear Room">Experience<span>Rear Room</span></button>
        <button data-spot="Garden">Contact<span>Garden</span></button>
      </nav>

      <div class="corner-panel">
        <span id="spotLabel">Bridge</span>
        <small>W/S move &middot; A/D turn &middot; Q/E strafe &middot; F interact &middot; drag to look</small>
      </div>

      <button class="time-pill" id="timeToggle" type="button" aria-label="Toggle time of day">
        <span id="timeLabel">Sakura Dawn</span>
        <small>Click to change</small>
      </button>

      <div class="reticle" aria-hidden="true"></div>
      <div class="interaction-hint" id="interactionHint" aria-live="polite"></div>
    </main>

    <!-- Mobile HUD — only shown on touch devices (isMobile flag in JS) -->
    <div class="mob-hud" id="mobHud" aria-hidden="true">

      <!-- Top bar: current location + time toggle + nav button -->
      <div class="mob-bar">
        <span class="mob-spot" id="mobSpot">Bridge Approach</span>
        <div class="mob-bar-actions">
          <button class="mob-icon-btn" id="mobTimeBtn" type="button" aria-label="Change time of day">
            <span id="mobTimeLabel">Dawn</span>
          </button>
          <button class="mob-icon-btn" id="mobNavBtn" type="button" aria-label="Open navigation">
            &#9776;
          </button>
        </div>
      </div>

      <!-- Nav overlay: teleport grid, shown when ☰ tapped -->
      <div class="mob-nav-overlay" id="mobNavOverlay" aria-hidden="true">
        <div class="mob-nav-grid">
          <button class="mob-nav-spot" data-spot="Bridge"    type="button"><strong>Start</strong><span>Bridge</span></button>
          <button class="mob-nav-spot" data-spot="Gate"      type="button"><strong>Entry</strong><span>Gate</span></button>
          <button class="mob-nav-spot" data-spot="Map"       type="button"><strong>Map</strong><span>Foyer</span></button>
          <button class="mob-nav-spot" data-spot="Hall"      type="button"><strong>Mission</strong><span>Main Hall</span></button>
          <button class="mob-nav-spot" data-spot="Tech"      type="button"><strong>Stack</strong><span>Tool Wall</span></button>
          <button class="mob-nav-spot" data-spot="West Room" type="button"><strong>Education</strong><span>West Room</span></button>
          <button class="mob-nav-spot" data-spot="East Room" type="button"><strong>Projects</strong><span>East Room</span></button>
          <button class="mob-nav-spot" data-spot="Rear Room" type="button"><strong>Experience</strong><span>Rear Room</span></button>
          <button class="mob-nav-spot" data-spot="Garden"    type="button"><strong>Contact</strong><span>Garden</span></button>
        </div>
        <button class="mob-nav-close" id="mobNavClose" type="button">&#10005; Close</button>
      </div>

      <!-- Left: virtual joystick -->
      <div class="joy-zone" id="joyZone">
        <div class="joy-base">
          <div class="joy-dot" id="joyDot"></div>
        </div>
      </div>

      <!-- Right: interact button -->
      <button class="touch-btn touch-interact" id="touchInteract" type="button" aria-label="Interact (F)">
        <span>F</span>
        <small>interact</small>
      </button>

    </div>

    <aside class="portfolio-panel" id="portfolioPanel" aria-hidden="true" aria-labelledby="portfolioTitle">
      <button class="panel-close" id="portfolioClose" type="button" aria-label="Close portfolio panel">Close</button>
      <p class="panel-eyebrow" id="portfolioEyebrow">Portfolio</p>
      <h2 id="portfolioTitle">Portfolio</h2>
      <div class="panel-body" id="portfolioBody"></div>
    </aside>

    <a class="back-home" href="./index.html" aria-label="Back to portfolio">&#8592; Portfolio</a>

    <script type="module" src="./src/main.js?v=16"></script>
  </body>
</html>
